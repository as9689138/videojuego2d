<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videojuego 2D</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/img/icono.png" type="image/png">

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="app-wrapper">
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-12">
                    <div class="collision-card shadow-sm">
                        <div class="card-header-custom">
                            <h1 class="title mb-1">Interactividad con gráficos 2D</h1>
                            <p class="subtitle mb-0">
                                Simulación interactiva de objetos en movimiento con detección de colisiones, eliminación por clic y respuesta visual en tiempo real.
                            </p>
                        </div>

                        <div class="game-controls">
                            <button id="startGameBtn" class="btn btn-primary start-btn">
                                Comenzar juego
                            </button>
                        </div>

                        <div class="canvas-wrapper">
                            <canvas id="canvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <audio id="bgMusic" loop>
        <source src="assets/audio/musica_fondo.mp3" type="audio/mpeg">
    </audio>

    <script src="colision.js"></script>
</body>
</html>
